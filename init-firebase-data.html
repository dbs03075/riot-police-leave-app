<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Firestore 데이터 초기화</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f0f4f9;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #0066CC;
            text-align: center;
            margin-bottom: 30px;
        }

        #status {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #0066CC;
            font-size: 16px;
            line-height: 1.8;
            min-height: 100px;
            color: #2c3e50;
            font-weight: 500;
        }

        .success {
            color: #27ae60;
        }

        .error {
            color: #e74c3c;
        }

        .info {
            color: #0066CC;
        }

        .note {
            margin-top: 30px;
            padding: 15px;
            background: #e8f4f8;
            border-radius: 8px;
            color: #0066CC;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🚀 Firebase Firestore 초기화</h1>
        <div id="status">준비 중...</div>
        <div class="note">
            <strong>📌 주의사항:</strong><br>
            ✓ 이 페이지는 <strong>처음 한 번만</strong> 실행해야 합니다<br>
            ✓ 실행 후 "✅ 완료!" 메시지가 나타나면 성공입니다<br>
            ✓ 그 다음 Firebase Auth 계정도 생성해야 로그인 가능합니다
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <!-- config.js 로드 -->
    <script src="js/config.js"></script>

    <script>
        const statusEl = document.getElementById('status');

        async function initializeData() {
            try {
                // Firestore 준비 확인
                if (!db) {
                    throw new Error('❌ Firestore가 초기화되지 않았습니다. config.js를 확인하세요.');
                }

                statusEl.innerHTML = '<span class="info">🔄 employees 컬렉션 생성 중...</span>';

                // 더미 직원 데이터
                const employeesData = [
                    // // 여기에 이름 입력 후 실행하면 됨.
                    // { name: "유네", email: "dbs@gmail.com", role: "employee", unit: "3제대", team: "7팀", createdAt: firebase.firestore.Timestamp.now() },
                    // { name: "3제대수인", email: "kim@example.com", role: "admin", unit: "3제대", createdAt: firebase.firestore.Timestamp.now() },
                    

                ];

                let successCount = 0;
                let failCount = 0;

                // 각 직원 추가
                for (const emp of employeesData) {
                    try {
                        await db.collection('employees').add(emp);
                        statusEl.innerHTML += `<br><span class="success">✓ ${emp.name} 추가됨 (${emp.email})</span>`;
                        successCount++;
                    } catch (error) {
                        statusEl.innerHTML += `<br><span class="error">✗ ${emp.name} 추가 실패: ${error.message}</span>`;
                        failCount++;
                    }
                }

                // 완료 메시지
                statusEl.innerHTML += `<br><br><strong class="success">✅ 완료!</strong><br>`;
                statusEl.innerHTML += `<span class="success">성공: ${successCount}명 / 실패: ${failCount}명</span><br><br>`;
                statusEl.innerHTML += `<span class="info">📌 다음 단계:</span><br>`;
                statusEl.innerHTML += `<span class="info">1️⃣  Firebase Console → Authentication에서</span><br>`;
                statusEl.innerHTML += `<span class="info">2️⃣  위 이메일들로 계정 생성하세요</span><br>`;
                statusEl.innerHTML += `<span class="info">3️⃣  그 후 앱에서 이름 + 비밀번호로 로그인</span>`;

                console.log('✓ 초기화 완료!');

            } catch (error) {
                console.error('❌ 에러:', error);
                statusEl.innerHTML = `<span class="error"><strong>❌ 오류 발생:</strong><br>${error.message}</span>`;
            }
        }

        // 페이지 로드 후 초기화 시작
        window.addEventListener('load', () => {
            setTimeout(initializeData, 1000);
        });
    </script>
</body>

</html>
