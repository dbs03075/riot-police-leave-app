<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연가 관리 시스템</title>
    <!-- CSS: 분리된 모듈 파일 -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/scrollbar.css">
    <link rel="stylesheet" href="css/detail-modal.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>

<body>
    <!-- 로그인 화면 -->
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <h1>연가 관리</h1>
            <p>팀원들의 연가 일정을 효율적으로 관리하세요</p>

            <div id="loginError"></div>

            <div class="form-group">
                <label>이름</label>
                <input type="text" id="nameInput" placeholder="이름을 입력하세요">
            </div>

            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" id="passwordInput" placeholder="••••••••">
            </div>

            <button class="login-btn" onclick="login()">로그인</button>
        </div>
    </div>

    <!-- 메인 앱 -->
    <div id="app" class="app">
        <!-- 헤더 -->
        <div class="header">
            <h1>📅 연가 관리 시스템</h1>
            <div class="header-info">
                <div class="unit-selector" id="unitSelectorContainer" style="display: none; margin-right: 20px;">
                    <select id="unitSelect" onchange="changeUnit(this.value)" class="reason-select" style="font-size: 14px; padding: 6px 30px 6px 12px; font-weight: bold; color: #0066CC; border: 1px solid rgba(0, 102, 204, 0.3);">
                        <option value="1제대">1제대</option>
                        <option value="2제대">2제대</option>
                        <option value="3제대">3제대</option>
                        <option value="test">test</option>
                    </select>
                </div>
                <div class="user-info">
                    <div class="user-name" id="currentUserName">-</div>
                    <div class="user-role" id="currentUserRole">-</div>
                </div>
                <button class="logout-btn" onclick="logout()">로그아웃</button>
            </div>
        </div>

        <!-- 메인 컨테이너 -->
        <div class="main-container">
            <!-- 탭 -->
            <div class="tabs" id="adminTabs" style="display: none;">
                <button class="tab-btn active" onclick="switchTab('calendar')">📅 캘린더</button>
                <button class="tab-btn" onclick="switchTab('settings')">⚙️ 설정</button>
            </div>

            <!-- 캘린더 탭 -->
            <div id="calendarTab" class="tab-content active">
                <div class="calendar-container">
                    <div class="calendar-header">
                        <h2>연가 캘린더</h2>
                        <div class="calendar-controls">
                            <div class="calendar-nav">
                                <button class="nav-btn" onclick="previousMonth()">← 이전</button>
                                <div class="month-year" id="monthYear"></div>
                                <button class="nav-btn" onclick="nextMonth()">다음 →</button>
                            </div>
                        </div>
                    </div>

                    <div class="weekdays">
                        <div class="weekday">일</div>
                        <div class="weekday">월</div>
                        <div class="weekday">화</div>
                        <div class="weekday">수</div>
                        <div class="weekday">목</div>
                        <div class="weekday">금</div>
                        <div class="weekday">토</div>
                    </div>

                    <div class="days" id="calendar"></div>
                </div>
            </div>


            <!-- 설정 탭 -->
            <div id="settingsTab" class="tab-content">
                <div class="settings-page">
                    <div style="margin-bottom: 20px;">
                        <h3 style="color: #0066CC; margin-bottom: 15px; font-size: 18px;">일자별 최대 인원 설정</h3>
                        <div class="settings-grid" id="settingsGrid">
                            <div class="add-date-setting" onclick="addDateSetting()">
                                <div style="font-size: 28px; margin-bottom: 8px;">+</div>
                                <div style="font-weight: 600;">일자 추가</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 연가 모달 -->
    <div id="leaveModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modalDateTitle">-</span>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>

            <div id="adminView" style="display: none;">
                <div class="employee-selection">
                    <label class="employee-label">직원 선택</label>
                    <input type="text" id="employeeSearch" class="employee-search" placeholder="🔍 직원 이름으로 검색...">
                    <div class="employee-list" id="employeeList"></div>
                </div>

                <div class="leave-list">
                    <div style="display:flex; align-items:center; margin-bottom: 12px;">
                        <div class="leave-list-title" style="margin-bottom:0;">현재 연가자</div>
                        <button class="detail-view-btn" onclick="openDetailView()">자세히 보기</button>
                    </div>
                    <div class="leave-items" id="leaveItems">
                        <div class="empty-state">
                            <p>아직 등록된 연가자가 없습니다</p>
                        </div>
                    </div>
                </div>

                <div class="button-group">
                    <button class="save-btn" onclick="saveLeave()">저장</button>
                    <button class="cancel-btn" onclick="closeModal()">취소</button>
                </div>
            </div>

            <div id="employeeView" style="display: none;">
                <div class="reason-selection">
                    <label class="reason-label">휴가 사유 선택</label>
                    <div class="reason-options" id="reasonOptions"></div>
                    <input type="text" id="detailReasonInput" class="detail-reason-input" placeholder="상세 사유를 입력하세요" style="display: none; margin-top: 10px; width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px;">
                </div>

                <div class="employee-selection">
                    <label class="employee-label">신청 현황</label>
                    <div style="padding: 20px; text-align: center; color: #6B7C8F;">
                        <p style="margin-bottom: 10px;" id="employeeCurrentStatus">-</p>
                        <button class="save-btn" style="margin-top: 20px; width: 100%;" id="toggleLeaveBtn"
                            onclick="toggleEmployeeLeave()">연가 신청</button>
                    </div>
                </div>

                <div class="button-group">
                    <button class="cancel-btn" style="flex: 1;" onclick="closeModal()">닫기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 자세히 보기 모달 -->
    <div id="detailViewModal" class="detail-modal">
        <div class="detail-modal-content">
            <div class="detail-modal-header">
                <h3>📋 연가자 상세 내역</h3>
                <button class="detail-close-btn" onclick="closeDetailView()">×</button>
            </div>
            <textarea id="detailViewText" class="detail-textarea" readonly></textarea>
            <div style="margin-top: 15px; text-align: right;">
                <button class="copy-btn" onclick="copyDetailText()">복사하기</button>
            </div>
        </div>
    </div>

    <!-- 앱 스크립트 (순서대로 로드) -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/leave-management.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/firebase-sync.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
